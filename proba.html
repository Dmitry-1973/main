 <script>
    column_1_width = document.getElementById('column_1').offsetWidth;
    column_2_width = document.getElementById('column_2').offsetWidth;
	


function setPage()
{
 columns_width = document.getElementById('columns').offsetWidth; 
 client_width = document.documentElement.clientWidth;
 client_height = document.documentElement.clientHeight;

    
  
 if (document.getElementById('column_1'))
 {
  if (columns_width => (column_1_width + column_2_width + 40)) 
   {
    document.getElementById('column_1').style.width = 'auto';
	document.getElementById('column_2').style.width = 'auto';

 
//    columns_width = document.getElementById('columns').offsetWidth;  
    column_1_marginRight = Math.ceil((columns_width - column_1_width - column_2_width)/3) + 10;
    document.getElementById('column_1').style.marginRight = column_1_marginRight + 'px';
   }	
  if (columns_width < (column_1_width + column_2_width + 40))
   {
    document.getElementById('column_1').style.marginRight = '0px';
    
    document.getElementById('column_1').style.width = max_column_width + 'px';
	document.getElementById('column_2').style.width = max_column_width + 'px';
   }
   
 }   

//alert('column_1: ' + column_1_width + ' column_2: ' + column_2_width + ' columns: ' + columns_width); 
 setTimeout('setPage()',100);

}

setPage();

max_column_width = Math.ceil(Math.max(column_1_width, column_2_width));
